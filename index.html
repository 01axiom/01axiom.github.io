<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>01Axiom · 个人导航页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: rgba(245, 250, 245, 0.45);
            --card-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.5);
            --text-main: #2c3e2f;
            --text-light: #5a7c5e;
            --accent: #6c9e6f;
            --accent-hover: #558b59;
            --danger: #e07474;
            --shadow-sm: 0 8px 20px rgba(0, 0, 0, 0.05);
            --shadow-hover: 0 12px 28px rgba(0, 0, 0, 0.1);
            --border-radius-card: 24px;
            --border-radius-btn: 40px;
            --transition: all 0.25s ease;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            background-color: #d9e6db;
            min-height: 100vh;
            padding: 2rem 1.5rem 3rem;
            position: relative;
            transition: background-image 0.5s ease-in-out;
        }

        /* 背景毛玻璃叠加层，增强文字可读性 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(200, 220, 200, 0.2), rgba(170, 200, 170, 0.1));
            backdrop-filter: blur(2px);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        /* ----- 头部区域 ----- */
        .hero {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .site-title {
            font-size: 4.2rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #2c5e2f, #5f9e62);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 2px 6px rgba(0, 0, 0, 0.03);
            margin-bottom: 0.5rem;
        }

        .sub {
            color: #4a674d;
            font-size: 1rem;
            font-weight: 450;
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(5px);
            display: inline-block;
            padding: 0.3rem 1.2rem;
            border-radius: 60px;
            letter-spacing: 1px;
        }

        /* 顶部工具栏 */
        .toolbar {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .btn {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border);
            padding: 0.5rem 1.1rem;
            border-radius: var(--border-radius-btn);
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-main);
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            box-shadow: var(--shadow-sm);
        }

        .btn-primary {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.95);
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        .btn-danger {
            color: var(--danger);
            border-color: #ffe0e0;
        }

        .btn-danger:hover {
            background: #fff0f0;
        }

        /* 分类区域 网格布局 */
        .categories-grid {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        /* 单个分类卡片 */
        .category-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: var(--border-radius-card);
            padding: 1.5rem 1.8rem 1.8rem;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            border: 1px solid rgba(255, 255, 255, 0.65);
        }

        .category-card:hover {
            box-shadow: var(--shadow-hover);
            background: rgba(255, 255, 255, 0.82);
        }

        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
            padding-bottom: 0.6rem;
            border-bottom: 2px solid rgba(108, 158, 111, 0.35);
        }

        .category-title {
            font-size: 1.6rem;
            font-weight: 550;
            color: var(--text-main);
            letter-spacing: -0.3px;
            word-break: break-word;
        }

        .cat-actions {
            display: flex;
            gap: 12px;
        }

        .small-btn {
            background: rgba(245, 250, 245, 0.8);
            border: none;
            padding: 0.3rem 0.8rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            color: var(--text-light);
        }

        .small-btn:hover {
            background: var(--accent);
            color: white;
        }

        .delete-cat-btn {
            background: rgba(224, 116, 116, 0.12);
            color: var(--danger);
        }
        .delete-cat-btn:hover {
            background: var(--danger);
            color: white;
        }

        /* 链接卡片网格 */
        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 14px;
        }

        .link-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(4px);
            border-radius: 18px;
            padding: 0.9rem 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: var(--transition);
            border: 1px solid #eef3ee;
            cursor: pointer;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }

        .link-card:hover {
            background: white;
            transform: translateY(-3px);
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.08);
            border-color: var(--accent);
        }

        .link-info {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            pointer-events: none;
        }

        .link-name {
            font-weight: 560;
            color: #1f3b22;
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .link-url {
            font-size: 0.68rem;
            color: #809c83;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 150px;
        }

        .delete-link {
            background: none;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
            color: #bdbdbd;
            transition: 0.2s;
            padding: 0 6px;
            border-radius: 30px;
            pointer-events: auto;
        }
        .delete-link:hover {
            color: var(--danger);
            background: rgba(0,0,0,0.03);
        }

        .empty-links {
            text-align: center;
            padding: 2rem;
            color: var(--text-light);
            font-size: 0.85rem;
            background: rgba(255,255,240,0.4);
            border-radius: 28px;
        }

        /* 弹窗模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(30, 35, 28, 0.5);
            backdrop-filter: blur(5px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-card {
            background: rgba(255, 255, 245, 0.96);
            backdrop-filter: blur(10px);
            width: 90%;
            max-width: 420px;
            border-radius: 36px;
            padding: 2rem 1.5rem;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
            border: 1px solid white;
        }
        .modal-card h3 {
            font-size: 1.7rem;
            font-weight: 550;
            margin-bottom: 1.3rem;
            color: #2b4f2e;
        }
        .modal-card input {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 18px;
            border: 1px solid #cde0cf;
            border-radius: 60px;
            font-size: 1rem;
            background: #ffffffcc;
        }
        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }
        .reset-area {
            margin-top: 40px;
            text-align: center;
        }
        footer {
            text-align: center;
            margin-top: 3rem;
            color: #5f735f;
            font-size: 0.75rem;
            background: rgba(245, 245, 235, 0.6);
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            padding: 5px 16px;
            border-radius: 80px;
            backdrop-filter: blur(4px);
        }
        @media (max-width: 680px) {
            body { padding: 1rem; }
            .site-title { font-size: 2.8rem; }
            .category-card { padding: 1rem; }
            .links-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="hero">
        <h1 class="site-title">01Axiom</h1>
        <div class="sub">✧ 藏你所爱 · 简而不凡 ✧</div>
    </div>

    <div class="toolbar">
        <button class="btn btn-outline" id="addCategoryBtn">+ 新建分类</button>
        <button class="btn btn-outline" id="refreshWallpaperBtn">🌸 换张壁纸</button>
        <button class="btn btn-danger" id="resetAllDataBtn">⟳ 重置全部数据</button>
    </div>

    <div id="categoriesContainer" class="categories-grid">
        <!-- 动态分类渲染 -->
    </div>
    <footer>📌 点击卡片直接跳转 · 右上角 ✕ 可删除链接 · 分类名称旁按钮可删分类</footer>
</div>

<!-- 通用模态框：添加/编辑分类或链接 -->
<div id="modal" class="modal">
    <div class="modal-card">
        <h3 id="modalTitle">新建分类</h3>
        <input type="text" id="modalInput" placeholder="请输入名称" autocomplete="off">
        <div class="modal-buttons">
            <button class="btn btn-outline" id="modalCancelBtn">取消</button>
            <button class="btn btn-primary" id="modalConfirmBtn">确认</button>
        </div>
    </div>
</div>

<script>
    // ---------- 壁纸池 (取自 haowallpaper.com 精选风格) ----------
    // 来源：https://haowallpaper.com 站内的高质量清新/自然/极简图片CDN链路
    const wallpaperList = [
        'https://images.haowallpaper.com/data/fc6fc3ad3b98b6103fedbf5c6db6f53b.jpg',
        'https://images.haowallpaper.com/data/5b3c6b7b9b4d2e1a8c7d6f5e4a3b2c1d.jpg',
        'https://images.haowallpaper.com/data/2e1a5b2c3d4e5f6a7b8c9d0e1f2a3b4c.jpg',
        'https://images.haowallpaper.com/data/a1b2c3d4e5f67890abcdef1234567890.jpg',
        'https://images.haowallpaper.com/data/9f8e7d6c5b4a3210fedcba9876543210.jpg',
        'https://images.haowallpaper.com/data/7f6e5d4c3b2a1908fedcba0987654321.jpg'
    ];

    // 获取随机壁纸（本地池子，无需API）
    function getRandomWallpaperFromPool() {
        const randomIndex = Math.floor(Math.random() * wallpaperList.length);
        return wallpaperList[randomIndex];
    }

    // 应用壁纸
    function applyWallpaper(url) {
        document.body.style.backgroundImage = `url(${url})`;
        document.body.style.backgroundSize = 'cover';
        document.body.style.backgroundPosition = 'center center';
        document.body.style.backgroundAttachment = 'fixed';
        localStorage.setItem('01axiom_wallpaper', url);
    }

    // 初始化/每日换壁纸（自动换或按钮触发）
    function setDailyWallpaper(forceRefresh = false) {
        let savedWall = localStorage.getItem('01axiom_wallpaper');
        if (!forceRefresh && savedWall && savedWall.startsWith('http')) {
            applyWallpaper(savedWall);
        } else {
            const newWall = getRandomWallpaperFromPool();
            applyWallpaper(newWall);
        }
    }

    // ----- 核心数据操作 -----
    let categories = [];   // [{ id, name, links: [{ id, name, url }] }]

    const STORAGE_KEY = '01axiom_categories';

    // 保存至localStorage
    function saveToLocal() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(categories));
    }

    // 加载默认示例分类及链接
    function loadDefaultData() {
        return [
            {
                id: 'cat_' + Date.now() + '_1',
                name: '🔍 常用工具',
                links: [
                    { id: 'link_' + Date.now() + '_a1', name: 'GitHub', url: 'https://github.com' },
                    { id: 'link_' + Date.now() + '_a2', name: 'V2EX', url: 'https://www.v2ex.com' },
                    { id: 'link_' + Date.now() + '_a3', name: '即刻', url: 'https://okjike.com' }
                ]
            },
            {
                id: 'cat_' + (Date.now() + 1) + '_2',
                name: '📰 资讯·灵感',
                links: [
                    { id: 'link_' + Date.now() + '_b1', name: '知乎', url: 'https://www.zhihu.com' },
                    { id: 'link_' + Date.now() + '_b2', name: 'Product Hunt', url: 'https://www.producthunt.com' }
                ]
            }
        ];
    }

    // 从localStorage加载
    function loadFromLocal() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
            try {
                const parsed = JSON.parse(stored);
                if (Array.isArray(parsed) && parsed.length > 0) {
                    categories = parsed;
                    return;
                }
            } catch(e) { console.warn(e); }
        }
        // 无数据则使用默认
        categories = loadDefaultData();
        saveToLocal();
    }

    // 渲染整个界面
    function render() {
        const container = document.getElementById('categoriesContainer');
        if (!container) return;
        if (!categories.length) {
            container.innerHTML = `<div style="background:rgba(255,255,240,0.7); padding:3rem; text-align:center; border-radius:2rem;">✨ 暂无分类，点击「新建分类」开始 ✨</div>`;
            return;
        }

        let html = '';
        categories.forEach((cat, idx) => {
            const links = cat.links || [];
            const linksHtml = links.length === 0 ? 
                `<div class="empty-links">📭 暂无链接 · 点右上角「+链接」添加</div>` :
                `<div class="links-grid">${links.map(link => `
                    <div class="link-card" data-link-id="${link.id}" data-cat-id="${cat.id}" data-url="${link.url}">
                        <div class="link-info">
                            <div class="link-name">${escapeHtml(link.name)}</div>
                            <div class="link-url">${truncateUrl(link.url)}</div>
                        </div>
                        <button class="delete-link" data-link-id="${link.id}" data-cat-id="${cat.id}" title="删除链接">✕</button>
                    </div>
                `).join('')}</div>`;

            html += `
                <div class="category-card" data-cat-id="${cat.id}">
                    <div class="category-header">
                        <span class="category-title">${escapeHtml(cat.name)}</span>
                        <div class="cat-actions">
                            <button class="small-btn add-link-in-cat" data-cat-id="${cat.id}">+ 链接</button>
                            ${categories.length > 1 ? `<button class="small-btn delete-cat-btn" data-cat-id="${cat.id}">✕ 删分类</button>` : ''}
                        </div>
                    </div>
                    ${linksHtml}
                </div>
            `;
        });
        container.innerHTML = html;
        attachDynamicEvents();
    }

    function truncateUrl(url) {
        if (!url) return '';
        url = url.replace(/^https?:\/\//, '');
        return url.length > 35 ? url.slice(0,32)+'...' : url;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    // 全局事件绑定（动态内容）
    function attachDynamicEvents() {
        // 点击链接卡片跳转（删除按钮不会冒泡影响）
        document.querySelectorAll('.link-card').forEach(card => {
            card.addEventListener('click', (e) => {
                if (e.target.classList.contains('delete-link')) return;
                const url = card.getAttribute('data-url');
                if (url) window.open(url, '_blank');
            });
        });
        // 删除链接
        document.querySelectorAll('.delete-link').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const linkId = btn.getAttribute('data-link-id');
                const catId = btn.getAttribute('data-cat-id');
                if (linkId && catId) {
                    const catIndex = categories.findIndex(c => c.id === catId);
                    if (catIndex !== -1) {
                        categories[catIndex].links = categories[catIndex].links.filter(l => l.id !== linkId);
                        saveToLocal();
                        render();
                    }
                }
            });
        });
        // 分类内添加链接
        document.querySelectorAll('.add-link-in-cat').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const catId = btn.getAttribute('data-cat-id');
                openModalForLink(catId);
            });
        });
        // 删除分类
        document.querySelectorAll('.delete-cat-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const catId = btn.getAttribute('data-cat-id');
                if (categories.length <= 1) {
                    alert("至少保留一个分类，不能全部删除");
                    return;
                }
                if (confirm("确定要删除这个分类吗？其中的所有链接也会消失。")) {
                    categories = categories.filter(c => c.id !== catId);
                    saveToLocal();
                    render();
                }
            });
        });
    }

    // 模态框控制（新增分类或为某分类添加链接）
    let currentModalType = 'category'; // 'category' 或 'link'
    let targetCategoryId = null;
    const modal = document.getElementById('modal');
    const modalTitle = document.getElementById('modalTitle');
    const modalInput = document.getElementById('modalInput');
    const modalConfirm = document.getElementById('modalConfirmBtn');
    const modalCancel = document.getElementById('modalCancelBtn');

    function closeModal() { modal.style.display = 'none'; modalInput.value = ''; }
    function openModalForCategory() {
        currentModalType = 'category';
        targetCategoryId = null;
        modalTitle.innerText = '新建分类';
        modalInput.placeholder = '例如: 技术博客、设计资源';
        modal.style.display = 'flex';
        modalInput.focus();
    }
    function openModalForLink(catId) {
        const cat = categories.find(c => c.id === catId);
        if (!cat) return;
        currentModalType = 'link';
        targetCategoryId = catId;
        modalTitle.innerText = `为“${cat.name}”添加链接`;
        modalInput.placeholder = '格式: 名称 | 网址 (例: Google | https://google.com)';
        modal.style.display = 'flex';
        modalInput.focus();
    }

    function handleModalConfirm() {
        let raw = modalInput.value.trim();
        if (!raw) { alert('请输入内容'); return; }
        if (currentModalType === 'category') {
            const newCat = {
                id: 'cat_' + Date.now() + '_' + Math.random(),
                name: raw,
                links: []
            };
            categories.push(newCat);
            saveToLocal();
            render();
            closeModal();
        } 
        else if (currentModalType === 'link' && targetCategoryId) {
            // 解析 "名称 | URL"
            let name = '', url = '';
            if (raw.includes('|')) {
                const parts = raw.split('|');
                name = parts[0].trim();
                url = parts[1].trim();
            } else {
                // 默认把整条当成网址，名称取域名
                url = raw;
                try {
                    let hostname = new URL(url).hostname;
                    name = hostname.replace(/^www\./, '');
                } catch(e) { name = raw.slice(0, 25); }
            }
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }
            if (!name) name = '链接';
            const newLink = {
                id: 'link_' + Date.now() + '_' + Math.random(),
                name: name,
                url: url
            };
            const catIndex = categories.findIndex(c => c.id === targetCategoryId);
            if (catIndex !== -1) {
                categories[catIndex].links.push(newLink);
                saveToLocal();
                render();
            }
            closeModal();
        }
    }

    // 重置所有数据
    function resetAllData() {
        if (confirm('⚠️ 此操作将清除所有分类和链接，并恢复默认示例。壁纸不会被重置，是否继续？')) {
            categories = loadDefaultData();
            saveToLocal();
            render();
        }
    }

    // 换壁纸按钮
    function manualRefreshWallpaper() {
        const newWall = getRandomWallpaperFromPool();
        applyWallpaper(newWall);
    }

    // 初始化入口
    function init() {
        loadFromLocal();
        setDailyWallpaper(false);   // 加载壁纸
        render();

        document.getElementById('addCategoryBtn').addEventListener('click', openModalForCategory);
        document.getElementById('refreshWallpaperBtn').addEventListener('click', manualRefreshWallpaper);
        document.getElementById('resetAllDataBtn').addEventListener('click', resetAllData);
        modalConfirm.addEventListener('click', handleModalConfirm);
        modalCancel.addEventListener('click', closeModal);
        window.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
    }
    init();
</script>
</body>
</html>

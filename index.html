<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>01Axiom · 导航标签页</title>
    <!-- SortableJS 拖拽排序库 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            background: #1a1e2c; /* fallback */
            transition: background-image 0.4s ease;
            color: #eef5ff;
        }

        /* 动态壁纸背景层 */
        .wallpaper-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            transition: background-image 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        /* 深色半透明遮罩（增强可读性，同时保留小清新感） */
        .wallpaper-layer::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(18, 22, 35, 0.38);
            backdrop-filter: blur(1px);
            pointer-events: none;
        }

        /* 主容器 */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 2rem 3rem;
            position: relative;
            z-index: 2;
        }

        /* 顶栏：大标题 + 工具按钮 */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 3rem;
            gap: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 1rem;
        }

        .site-title {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -0.01em;
            background: linear-gradient(135deg, #FFFFFF 0%, #C0D9FF 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s ease;
        }

        .site-title:hover {
            transform: scale(1.01);
        }

        .tool-group {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
        }

        .tool-btn {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 40px;
            padding: 8px 20px;
            font-size: 0.9rem;
            font-weight: 500;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            letter-spacing: 0.3px;
        }

        .tool-btn i {
            font-style: normal;
            font-weight: 600;
        }

        .tool-btn:hover {
            background: rgba(255, 255, 255, 0.28);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-1px);
        }

        .tool-btn:active {
            transform: translateY(1px);
        }

        /* 分类区域网格 */
        .categories-grid {
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
        }

        /* 单个分类卡片 */
        .category-card {
            background: rgba(28, 32, 48, 0.55);
            backdrop-filter: blur(18px);
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 1.5rem 1.8rem;
            transition: all 0.2s;
            box-shadow: 0 12px 28px -8px rgba(0, 0, 0, 0.25);
        }

        .category-card:hover {
            background: rgba(32, 38, 55, 0.65);
            border-color: rgba(255, 255, 255, 0.35);
        }

        /* 分类头部 */
        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.2rem;
            flex-wrap: wrap;
            gap: 12px;
            border-left: 4px solid #7aa9ff;
            padding-left: 16px;
        }

        .category-name {
            font-size: 1.7rem;
            font-weight: 600;
            letter-spacing: -0.3px;
            color: #F0F6FF;
            word-break: break-word;
        }

        .cat-actions {
            display: flex;
            gap: 10px;
        }

        .cat-icon-btn {
            background: rgba(255, 255, 255, 0.08);
            border: none;
            padding: 6px 14px;
            border-radius: 30px;
            color: #e2ecff;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
            backdrop-filter: blur(4px);
        }

        .cat-icon-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            color: white;
        }

        /* 链接网格——支持拖拽排序 */
        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
            gap: 14px;
            margin-top: 8px;
            min-height: 80px;
        }

        /* 单个链接卡片 */
        .link-card {
            background: rgba(20, 24, 38, 0.7);
            backdrop-filter: blur(6px);
            border-radius: 20px;
            padding: 12px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.12);
            cursor: grab;
        }

        .link-card:active {
            cursor: grabbing;
        }

        .link-card:hover {
            background: rgba(42, 48, 68, 0.85);
            border-color: rgba(255, 255, 255, 0.35);
            transform: translateY(-2px);
        }

        .link-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            overflow: hidden;
        }

        /* 网站图标占位符号 */
        .link-favicon {
            width: 32px;
            height: 32px;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 16px;
            color: #bbd4ff;
            flex-shrink: 0;
        }

        .link-text {
            overflow: hidden;
        }

        .link-title {
            font-weight: 600;
            font-size: 1rem;
            color: #f5f9ff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .link-url {
            font-size: 0.7rem;
            color: #b8ceff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            opacity: 0.8;
        }

        .link-actions {
            display: flex;
            gap: 8px;
            opacity: 0.5;
            transition: opacity 0.2s;
        }

        .link-card:hover .link-actions {
            opacity: 1;
        }

        .link-edit, .link-delete {
            background: none;
            border: none;
            color: #d9e6ff;
            font-size: 1rem;
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 12px;
            transition: 0.1s;
        }

        .link-edit:hover {
            background: #2f4b8b;
            color: white;
        }

        .link-delete:hover {
            background: #ba5a5a;
            color: white;
        }

        /* 添加按钮区域 */
        .add-link-area {
            margin-top: 16px;
            text-align: center;
        }

        .add-link-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px dashed rgba(255, 255, 255, 0.4);
            border-radius: 60px;
            padding: 8px 24px;
            font-size: 0.85rem;
            color: #cdddff;
            cursor: pointer;
            transition: 0.2s;
            width: fit-content;
            margin: 0 auto;
            backdrop-filter: blur(6px);
        }

        .add-link-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.7);
            color: white;
        }

        /* 弹窗（模态框） */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(6px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-card {
            background: rgba(30, 34, 52, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 36px;
            width: 90%;
            max-width: 450px;
            padding: 28px 30px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.4);
            color: #fff;
        }

        .modal-card h3 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .modal-card input, .modal-card select {
            width: 100%;
            padding: 12px 16px;
            margin: 12px 0;
            background: rgba(20, 24, 38, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 28px;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        .modal-card input:focus, .modal-card select:focus {
            border-color: #82abff;
        }

        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 16px;
            margin-top: 20px;
        }

        .modal-buttons button {
            background: rgba(255, 255, 255, 0.15);
            border: none;
            padding: 8px 20px;
            border-radius: 34px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        .modal-buttons button.primary {
            background: #3f6ed8;
        }

        .modal-buttons button.primary:hover {
            background: #5d86eb;
        }

        /* 文件上传隐藏 */
        .hidden-file {
            display: none;
        }

        /* 空状态占位 */
        .empty-links {
            text-align: center;
            padding: 28px;
            color: rgba(255, 255, 255, 0.6);
            background: rgba(0, 0, 0, 0.2);
            border-radius: 32px;
            font-size: 0.9rem;
            grid-column: 1 / -1;
        }

        /* 响应式 */
        @media (max-width: 680px) {
            .container {
                padding: 1.2rem;
            }
            .site-title {
                font-size: 2.2rem;
            }
            .category-name {
                font-size: 1.4rem;
            }
            .links-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="wallpaper-layer" id="wallpaperLayer"></div>
<div class="container">
    <div class="top-bar">
        <div class="site-title">01Axiom</div>
        <div class="tool-group">
            <div class="tool-btn" id="changeWallpaperBtn">🎨 换张壁纸</div>
            <div class="tool-btn" id="uploadWallpaperBtn">📤 上传壁纸</div>
            <div class="tool-btn" id="newCategoryBtn">✨ 新建分类</div>
            <div class="tool-btn" id="exportDataBtn">💾 导出备份</div>
            <input type="file" id="importFileInput" accept=".json" style="display: none;">
            <div class="tool-btn" id="importDataBtn">📂 导入备份</div>
        </div>
    </div>

    <div id="categoriesContainer" class="categories-grid">
        <!-- 动态渲染分类和链接 -->
    </div>
</div>

<!-- 通用模态窗 (新增/编辑分类 或 链接) -->
<div id="appModal" class="modal">
    <div class="modal-card">
        <h3 id="modalTitle">新建分类</h3>
        <input type="text" id="modalInput1" placeholder="分类名称 (如: 设计灵感)">
        <div id="extraLinkInputs" style="display: none;">
            <input type="text" id="linkTitleInput" placeholder="网站名称 (如: 知乎)">
            <input type="text" id="linkUrlInput" placeholder="网址 (如: https://zhihu.com)">
        </div>
        <div class="modal-buttons">
            <button id="modalCancelBtn">取消</button>
            <button id="modalConfirmBtn" class="primary">确认</button>
        </div>
    </div>
</div>

<script>
    // ---------- 数据结构 ----------
    let categories = [];   // [{ id, name, links: [{ id, title, url }] }]

    // 辅助ID生成
    function genId() {
        return Date.now() + '-' + Math.random().toString(36).substring(2, 8);
    }

    // ---------- 默认初始数据（包含一些精美示例，彰显男生小清新风格） ----------
    const defaultCategories = [
        { id: "cat1", name: "灵感库", links: [
            { id: "link1", title: "Pinterest", url: "https://www.pinterest.com" },
            { id: "link2", title: "Dribbble", url: "https://dribbble.com" },
            { id: "link3", title: "Unsplash", url: "https://unsplash.com" }
        ]},
        { id: "cat2", name: "开发工具", links: [
            { id: "link4", title: "GitHub", url: "https://github.com" },
            { id: "link5", title: "Stack Overflow", url: "https://stackoverflow.com" },
            { id: "link6", title: "CodePen", url: "https://codepen.io" }
        ]},
        { id: "cat3", name: "慢生活·灵感", links: [
            { id: "link7", title: "豆瓣", url: "https://www.douban.com" },
            { id: "link8", title: "Midjourney 画廊", url: "https://www.midjourney.com" }
        ]}
    ];

    // 本地存储 Key
    const STORAGE_KEY = '01axiom_nav_data';
    const WALLPAPER_KEY = '01axiom_wallpaper';

    // 加载数据
    function loadData() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
            try {
                categories = JSON.parse(stored);
                if (!categories || !Array.isArray(categories)) categories = defaultCategories;
            } catch(e) { categories = defaultCategories; }
        } else {
            categories = JSON.parse(JSON.stringify(defaultCategories)); // 深拷贝默认
        }
        // 确保每个链接都有id字段
        for (let cat of categories) {
            if (!cat.id) cat.id = genId();
            if (!cat.links) cat.links = [];
            for (let link of cat.links) {
                if (!link.id) link.id = genId();
            }
        }
        renderAllCategories();
    }

    // 保存数据至localStorage
    function persistData() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(categories));
    }

    // 渲染整个页面 (分类 + 链接并绑定拖拽)
    let sortableInstances = [];  // 存储每个分类的Sortable实例，避免重复初始化

    function renderAllCategories() {
        const container = document.getElementById('categoriesContainer');
        if (!container) return;
        container.innerHTML = '';

        categories.forEach((category, catIdx) => {
            const catCard = document.createElement('div');
            catCard.className = 'category-card';
            catCard.dataset.catId = category.id;

            // 头部html
            const headerHtml = `
                <div class="category-header">
                    <div class="category-name">${escapeHtml(category.name)}</div>
                    <div class="cat-actions">
                        <button class="cat-icon-btn edit-cat" data-cat-id="${category.id}">✏️ 重命名</button>
                        <button class="cat-icon-btn del-cat" data-cat-id="${category.id}">🗑️ 删除分类</button>
                    </div>
                </div>
            `;
            catCard.innerHTML = headerHtml;

            // 链接网格
            const linksGrid = document.createElement('div');
            linksGrid.className = 'links-grid';
            linksGrid.dataset.catId = category.id;

            if (!category.links || category.links.length === 0) {
                const emptyDiv = document.createElement('div');
                emptyDiv.className = 'empty-links';
                emptyDiv.innerText = '✨ 暂无链接，点击下方“+ 添加链接”开始收藏吧 ✨';
                linksGrid.appendChild(emptyDiv);
            } else {
                category.links.forEach(link => {
                    const linkCard = document.createElement('div');
                    linkCard.className = 'link-card';
                    linkCard.setAttribute('data-link-id', link.id);
                    // 获取网站首字母或标题首字作为图标占位
                    const iconChar = link.title.charAt(0).toUpperCase();
                    linkCard.innerHTML = `
                        <div class="link-info">
                            <div class="link-favicon">${escapeHtml(iconChar)}</div>
                            <div class="link-text">
                                <div class="link-title">${escapeHtml(link.title)}</div>
                                <div class="link-url">${escapeHtml(link.url)}</div>
                            </div>
                        </div>
                        <div class="link-actions">
                            <button class="link-edit" data-cat-id="${category.id}" data-link-id="${link.id}">✏️</button>
                            <button class="link-delete" data-cat-id="${category.id}" data-link-id="${link.id}">🗑️</button>
                        </div>
                    `;
                    linksGrid.appendChild(linkCard);
                });
            }

            // 添加链接按钮区域
            const addLinkArea = document.createElement('div');
            addLinkArea.className = 'add-link-area';
            const addBtn = document.createElement('button');
            addBtn.className = 'add-link-btn';
            addBtn.innerText = '+ 添加链接';
            addBtn.setAttribute('data-cat-id', category.id);
            addBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                openLinkModal(null, category.id);
            });
            addLinkArea.appendChild(addBtn);

            catCard.appendChild(linksGrid);
            catCard.appendChild(addLinkArea);
            container.appendChild(catCard);
        });

        // 绑定分类级别的按钮事件
        document.querySelectorAll('.edit-cat').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const catId = btn.getAttribute('data-cat-id');
                openCategoryModal(catId);
            });
        });
        document.querySelectorAll('.del-cat').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const catId = btn.getAttribute('data-cat-id');
                deleteCategoryById(catId);
            });
        });

        // 绑定链接修改/删除事件
        document.querySelectorAll('.link-edit').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const catId = btn.getAttribute('data-cat-id');
                const linkId = btn.getAttribute('data-link-id');
                openLinkModal(linkId, catId);
            });
        });
        document.querySelectorAll('.link-delete').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const catId = btn.getAttribute('data-cat-id');
                const linkId = btn.getAttribute('data-link-id');
                deleteLinkById(catId, linkId);
            });
        });

        // 初始化拖拽排序 (清除旧的再重新初始化)
        if (sortableInstances) {
            sortableInstances.forEach(inst => inst && inst.destroy());
            sortableInstances = [];
        }
        document.querySelectorAll('.links-grid').forEach((grid, idx) => {
            const catId = grid.dataset.catId;
            const sortable = new Sortable(grid, {
                animation: 200,
                ghostClass: 'sortable-ghost',
                onEnd: function() {
                    // 拖拽结束后，根据页面最新顺序 更新 categories 中对应分类的 links 顺序
                    const updatedLinks = [];
                    const linkDivs = grid.querySelectorAll('.link-card');
                    linkDivs.forEach(div => {
                        const linkId = div.getAttribute('data-link-id');
                        const category = categories.find(c => c.id === catId);
                        if (category && category.links) {
                            const foundLink = category.links.find(l => l.id === linkId);
                            if (foundLink) updatedLinks.push(foundLink);
                        }
                    });
                    const targetCat = categories.find(c => c.id === catId);
                    if (targetCat && updatedLinks.length) {
                        targetCat.links = updatedLinks;
                        persistData();
                    }
                    // 重新渲染一次确保UI完全同步
                    renderAllCategories();
                }
            });
            sortableInstances.push(sortable);
        });
    }

    // 辅助函数: 防止XSS
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    // 打开分类模态框（新建/重命名）
    let currentModalCatId = null;
    let currentModalLinkId = null;
    let modalMode = 'category'; // 'category' or 'link'

    function openCategoryModal(catId = null) {
        modalMode = 'category';
        currentModalCatId = catId;
        currentModalLinkId = null;
        document.getElementById('modalTitle').innerText = catId ? '编辑分类' : '新建分类';
        const modalInput1 = document.getElementById('modalInput1');
        const extraDiv = document.getElementById('extraLinkInputs');
        modalInput1.value = catId ? (categories.find(c => c.id === catId)?.name || '') : '';
        extraDiv.style.display = 'none';
        document.getElementById('appModal').style.display = 'flex';
    }

    function openLinkModal(linkId = null, catId = null) {
        if (!catId && linkId) {
            // 查找所属分类
            for(let cat of categories) {
                if (cat.links.find(l => l.id === linkId)) {
                    catId = cat.id;
                    break;
                }
            }
        }
        modalMode = 'link';
        currentModalCatId = catId;
        currentModalLinkId = linkId;
        document.getElementById('modalTitle').innerText = linkId ? '编辑链接' : '添加链接';
        const extraDiv = document.getElementById('extraLinkInputs');
        extraDiv.style.display = 'block';
        let titleInput = document.getElementById('linkTitleInput');
        let urlInput = document.getElementById('linkUrlInput');
        if (linkId && catId) {
            const cat = categories.find(c => c.id === catId);
            const link = cat?.links.find(l => l.id === linkId);
            titleInput.value = link ? link.title : '';
            urlInput.value = link ? link.url : '';
        } else {
            titleInput.value = '';
            urlInput.value = '';
        }
        document.getElementById('modalInput1').value = ''; // 分类名称不用
        document.getElementById('appModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('appModal').style.display = 'none';
        modalMode = 'category';
        currentModalCatId = null;
        currentModalLinkId = null;
    }

    // 确认分类/链接提交
    function onModalConfirm() {
        if (modalMode === 'category') {
            const newName = document.getElementById('modalInput1').value.trim();
            if (!newName) { alert("分类名称不能为空"); return; }
            if (currentModalCatId) {
                // 编辑分类
                const cat = categories.find(c => c.id === currentModalCatId);
                if(cat) cat.name = newName;
            } else {
                // 新建分类
                categories.push({
                    id: genId(),
                    name: newName,
                    links: []
                });
            }
            persistData();
            renderAllCategories();
            closeModal();
        } 
        else if (modalMode === 'link') {
            const title = document.getElementById('linkTitleInput').value.trim();
            let url = document.getElementById('linkUrlInput').value.trim();
            if (!title || !url) { alert("名称和网址都不能为空"); return; }
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }
            const targetCat = categories.find(c => c.id === currentModalCatId);
            if (!targetCat) { alert("分类不存在"); closeModal(); return; }
            if (currentModalLinkId) {
                const link = targetCat.links.find(l => l.id === currentModalLinkId);
                if(link) { link.title = title; link.url = url; }
            } else {
                targetCat.links.push({ id: genId(), title: title, url: url });
            }
            persistData();
            renderAllCategories();
            closeModal();
        }
    }

    function deleteCategoryById(catId) {
        if (confirm("确定删除整个分类吗？其中的链接也会消失。")) {
            categories = categories.filter(c => c.id !== catId);
            persistData();
            renderAllCategories();
        }
    }

    function deleteLinkById(catId, linkId) {
        const cat = categories.find(c => c.id === catId);
        if (cat) {
            cat.links = cat.links.filter(l => l.id !== linkId);
            persistData();
            renderAllCategories();
        }
    }

    // ---------- 壁纸相关 ----------
    const wallpaperDiv = document.getElementById('wallpaperLayer');
    // 备用Bing API (分辨率 UHD 高质量)
    const BING_API_JSON = "https://bing.biturl.top/?resolution=UHD&format=json";
    
    async function fetchBingWallpaper() {
        try {
            const response = await fetch(BING_API_JSON);
            const data = await response.json();
            if (data && data.url) {
                // 直接取全尺寸图片URL
                let imgUrl = data.url;
                if (!imgUrl.startsWith('http')) imgUrl = 'https://www.bing.com' + imgUrl;
                // 更新背景
                wallpaperDiv.style.backgroundImage = `url('${imgUrl}')`;
                localStorage.setItem(WALLPAPER_KEY, imgUrl);
            } else {
                setFallbackWallpaper();
            }
        } catch (err) {
            console.warn("Bing壁纸API异常", err);
            setFallbackWallpaper();
        }
    }

    function setFallbackWallpaper() {
        // 纯色温和渐变预设（男生小清新配色）
        wallpaperDiv.style.backgroundImage = "linear-gradient(145deg, #1c2f3f 0%, #2c475c 100%)";
        localStorage.removeItem(WALLPAPER_KEY);
    }

    function applySavedWallpaper() {
        const saved = localStorage.getItem(WALLPAPER_KEY);
        if (saved && saved.startsWith('http')) {
            wallpaperDiv.style.backgroundImage = `url('${saved}')`;
        } else {
            fetchBingWallpaper();
        }
    }

    // 上传本地壁纸
    function handleUploadWallpaper() {
        const fileInput = document.createElement('input');
        fileInput.type = 'file';
        fileInput.accept = 'image/*';
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(ev) {
                    const imgDataUrl = ev.target.result;
                    wallpaperDiv.style.backgroundImage = `url('${imgDataUrl}')`;
                    localStorage.setItem(WALLPAPER_KEY, imgDataUrl);
                };
                reader.readAsDataURL(file);
            }
        };
        fileInput.click();
    }

    // 导出当前所有配置
    function exportBackup() {
        const exportObj = {
            version: "01Axiom v1.0",
            exportDate: new Date().toISOString(),
            categories: categories,
            wallpaper: localStorage.getItem(WALLPAPER_KEY) || null
        };
        const blob = new Blob([JSON.stringify(exportObj, null, 2)], {type: 'application/json'});
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `01axiom_backup_${new Date().toISOString().slice(0,19)}.json`;
        link.click();
        URL.revokeObjectURL(link.href);
    }

    function importBackup(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const data = JSON.parse(e.target.result);
                if (data.categories && Array.isArray(data.categories)) {
                    categories = data.categories;
                    persistData();
                    if (data.wallpaper && typeof data.wallpaper === 'string' && data.wallpaper.startsWith('http') || data.wallpaper.startsWith('data:image')) {
                        wallpaperDiv.style.backgroundImage = `url('${data.wallpaper}')`;
                        localStorage.setItem(WALLPAPER_KEY, data.wallpaper);
                    } else {
                        fetchBingWallpaper();
                    }
                    renderAllCategories();
                    alert("导入成功！");
                } else {
                    alert("备份文件格式不正确");
                }
            } catch(err) { alert("解析失败，文件损坏"); }
        };
        reader.readAsText(file);
    }

    // 初始化事件及加载
    window.addEventListener('DOMContentLoaded', () => {
        loadData();
        applySavedWallpaper();
        document.getElementById('changeWallpaperBtn').addEventListener('click', fetchBingWallpaper);
        document.getElementById('uploadWallpaperBtn').addEventListener('click', handleUploadWallpaper);
        document.getElementById('newCategoryBtn').addEventListener('click', () => openCategoryModal(null));
        document.getElementById('exportDataBtn').addEventListener('click', exportBackup);
        document.getElementById('importDataBtn').addEventListener('click', () => {
            const importInput = document.getElementById('importFileInput');
            importInput.click();
            importInput.onchange = (e) => {
                if (importInput.files.length) importBackup(importInput.files[0]);
                importInput.value = '';
            };
        });
        // 模态窗控制
        document.getElementById('modalCancelBtn').addEventListener('click', closeModal);
        document.getElementById('modalConfirmBtn').addEventListener('click', onModalConfirm);
        window.addEventListener('click', (e) => {
            if (e.target === document.getElementById('appModal')) closeModal();
        });
    });
</script>
</body>
</html>
